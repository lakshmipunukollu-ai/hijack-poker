service: streaks-api

frameworkVersion: '3'

package:
  patterns:
    - '!../../shared/node_modules/**'
    - ../../shared/**

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  memorySize: 256
  timeout: 30
  environment:
    STAGE: ${self:provider.stage}
    NODE_ENV: production
    STREAKS_PLAYERS_TABLE: !Ref StreaksPlayersTable
    STREAKS_ACTIVITY_TABLE: !Ref StreaksActivityTable
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt StreaksPlayersTable.Arn
            - !GetAtt StreaksActivityTable.Arn

functions:
  api:
    handler: handler.api
    events:
      - httpApi: '*'

resources:
  Resources:
    StreaksPlayersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-players
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
    StreaksActivityTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-activity
        AttributeDefinitions:
          - AttributeName: playerId
            AttributeType: S
          - AttributeName: date
            AttributeType: S
        KeySchema:
          - AttributeName: playerId
            KeyType: HASH
          - AttributeName: date
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
