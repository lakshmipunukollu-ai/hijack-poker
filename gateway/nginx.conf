worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    client_max_body_size 256m;
    proxy_buffering off;

    # DNS resolver — substituted at container startup from /etc/resolv.conf
    resolver ${DNS_RESOLVER} valid=10s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── WebGL static files ─────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Serve pre-compressed .gz files with correct headers
        location ~* \.js\.gz$ {
            add_header Content-Encoding gzip;
            default_type application/javascript;
        }

        location ~* \.wasm\.gz$ {
            add_header Content-Encoding gzip;
            default_type application/wasm;
        }

        location ~* \.data\.gz$ {
            add_header Content-Encoding gzip;
            default_type application/octet-stream;
        }

        # ── API proxy → holdem-processor (dynamic resolution) ──────────
        location /api/ {
            set $upstream_api holdem-processor.railway.internal;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://$upstream_api:3030;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── WebSocket proxy → cash-game-broadcast (dynamic resolution) ─
        location /ws {
            set $upstream_ws cash-game-broadcast.railway.internal;
            proxy_pass http://$upstream_ws:3032;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
